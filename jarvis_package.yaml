name: "medication_tracker"
display_name: "Medication Tracker"
description: "Track personal and household medications, get reminders when a dose is due, and mark doses administered. Medications are managed in the app; voice is for marking doses and quick queries."
version: "0.2.2"
min_jarvis_version: "0.1.115"
# SDK 0.4.1 adds the command-data create-verb (IJarvisCommand.data_browser_create
# / data_browser_supports_create + FieldSpec.create_only) that the in-app "add
# medication" flow uses. The node must also carry the command-data `create` op.
min_sdk_version: "0.4.1"
license: "Apache-2.0"
author:
  github: "alexberardi"
categories: ["health", "productivity"]
platforms: ["darwin", "linux"]
keywords: ["medication", "meds", "medicine", "pill", "dose", "prescription", "reminder"]

packages: []

# No secrets in v1: medication records carry their own owner (top-level user_id),
# so the reminder agent watches all meds without a pinning secret.
secrets: []
